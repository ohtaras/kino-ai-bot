name: Ultra Fast Kino Update
on:
  schedule:
    - cron: '*/5 * * * *' # Αυτόματο κάθε 5 λεπτά
  workflow_dispatch: # Κουμπί για χειροκίνητο τρέξιμο

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Δίνει άδεια στο GitHub να γράψει το αρχείο CSV
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch Data
        run: |
          python -c "
          import requests, pandas as pd
          headers = {'User-Agent': 'Mozilla/5.0'}
          try:
              res = requests.get('https://api.opap.gr/draws/v3.0/1100/last/100', headers=headers, timeout=15).json()
              draws = [d['winningNumbers']['list'] for d in res]
              pd.DataFrame(draws).to_csv('kino_data.csv', index=False)
              print('Success: Data saved to CSV')
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add kino_data.csv
          git commit -m 'Auto-update Kino data' || exit 0
          git push
