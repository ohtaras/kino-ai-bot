name: Update Kino Data
on:
  workflow_dispatch: # Μόνο χειροκίνητα για να το ελέγξουμε

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas requests

      - name: Fetch and Save
        run: |
          python -c "
          import requests, pandas as pd, sys
          headers = {'User-Agent': 'Mozilla/5.0'}
          try:
              # Δοκιμάζουμε να πάρουμε μόνο τις τελευταίες 10 κληρώσεις για σιγουριά
              res = requests.get('https://api.opap.gr/draws/v3.0/1100/last/10', headers=headers, timeout=20)
              print(f'Status Code: {res.status_code}')
              data = res.json()
              
              draws = [d['winningNumbers']['list'] for d in data]
              df = pd.DataFrame(draws)
              df.to_csv('kino_data.csv', index=False)
              print('CSV Created Successfully!')
          except Exception as e:
              print(f'Error detail: {e}')
              sys.exit(1)
          "
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add kino_data.csv
          git commit -m "Manual data update" || exit 0
          git push
