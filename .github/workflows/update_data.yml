name: Ultra Fast Kino Update
on:
  schedule:
    - cron: '*/5 * * * *' # Τρέχει αυτόματα κάθε 5 λεπτά
  workflow_dispatch: # Σου επιτρέπει να το ξεκινάς χειροκίνητα

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Fetch Data
        run: |
          python -c "
          import requests, pandas as pd
          headers = {'User-Agent': 'Mozilla/5.0'}
          try:
              # Λήψη των τελευταίων 100 κληρώσεων
              res = requests.get('https://api.opap.gr/draws/v3.0/1100/last/100', headers=headers, timeout=15).json()
              draws = [d['winningNumbers']['list'] for d in res]
              pd.DataFrame(draws).to_csv('kino_data.csv', index=False)
              print('Data fetched and saved to CSV')
          except Exception as e:
              print(f'Error: {e}')
          "
      - name: Push to GitHub
        run: |
          git config --global user.name 'Kino Bot'
          git config --global user.email 'bot@kino.ai'
          git add kino_data.csv
          git commit -m 'Automatic Data Update' || exit 0
          git push
