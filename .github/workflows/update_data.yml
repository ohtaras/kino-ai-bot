name: Ultra Fast Kino Update
on:
  schedule:
    - cron: '*/5 * * * *' # Αυτόματο κάθε 5 λεπτά
  workflow_dispatch: # Χειροκίνητο κουμπί

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Tools
        run: pip install requests pandas # ΕΔΩ ΗΤΑΝ ΤΟ ΛΑΘΟΣ - ΤΩΡΑ ΤΑ ΕΓΚΑΘΙΣΤΑ

      - name: Fetch Data
        run: |
          python -c "
          import requests, pandas as pd
          headers = {'User-Agent': 'Mozilla/5.0'}
          try:
              res = requests.get('https://api.opap.gr/draws/v3.0/1100/last/100', headers=headers, timeout=15).json()
              draws = [d['winningNumbers']['list'] for d in res]
              pd.DataFrame(draws).to_csv('kino_data.csv', index=False)
              print('Success: Data saved!')
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "
      - name: Push to GitHub
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add kino_data.csv
          git commit -m 'Fast Update' || exit 0
          git push
